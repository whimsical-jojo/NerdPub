<div class="sessions-admin-page">
  
  <div class="filter-header">
    <app-city-picker [(city)]="selectedCity" />

    <div class="slider-container">
      <label>Giorni futuri: <strong>{{ daysAhead() }}</strong></label>
      <mat-slider min="1" max="30" step="1" thumbLabel>
        <input matSliderThumb [ngModel]="daysAhead()" (ngModelChange)="daysAhead.set($event)">
      </mat-slider>
    </div>

    <button mat-raised-button color="primary" (click)="search()">
      <mat-icon>search</mat-icon> Cerca Sessioni
    </button>

    <button mat-fab extended color="accent" (click)="openSessionForm()">
      <mat-icon>add</mat-icon> Nuova Sessione
    </button>
  </div>

  <div class="sessions-list">
    @for (s of sessions(); track s.id) {
      <mat-card appearance="outlined" class="session-card">
        <mat-card-header>
          <mat-card-title>{{ s.game.title }}</mat-card-title>
          <mat-card-subtitle>
            {{ s.date | date: 'EEEE d MMMM, HH:mm' }} 
            • {{ s.table.pub.name }} ({{ s.table.name }})
          </mat-card-subtitle>
        </mat-card-header>
        
        <mat-card-actions align="end">
          <button mat-button (click)="openSessionForm(s)">Modifica
            <mat-icon>edit</mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    } @empty {
      <div class="empty-state">
        <p>Nessuna sessione trovata per i criteri selezionati.</p>
      </div>
    }
  </div>
</div>
