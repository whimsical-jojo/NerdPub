<div class="adminpage">

    <!-- HEADER -->
    <div class="w3-container profile-header w3-center">
        <h1 class="profile-title">Pannello di amministrazione</h1>
        <p class="profile-subtitle">
            Gestisci in modo semplice utenti, pub, giochi e sessioni.
        </p>
    </div>

    <!-- NAV TABS -->
    <nav mat-tab-nav-bar [tabPanel]="tabPanel">
        @for (link of links; track link.path) {
        <a mat-tab-link [routerLink]="['/admin', link.path]" routerLinkActive #rla="routerLinkActive"
            [active]="rla.isActive">
            {{ link.label }}
        </a>
        }
    </nav>
    <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>

    <router-outlet></router-outlet>

</div>
