<div class="members-page">

    <!-- Search bar -->
    <mat-form-field appearance="outline" class="search-bar">
        <mat-label>Cerca membri</mat-label>
        <input matInput placeholder="Enter name or username" [(ngModel)]="search">
        <button mat-icon-button matSuffix (click)="search.set('')">
            <mat-icon>close</mat-icon>
        </button>
    </mat-form-field>

    <!-- Register new member button-->
    <button mat-raised-button color="primary" (click)="openMemberForm()">
        Registra nuovo utente
    </button>

    <!-- Member cards -->
    <div class="members-list">
        <!-- TODO ADD FRONT END FILTERS-->
        @for (member of members(); track member.id) {
        <mat-card appearance="outlined" class="member-card">
            <mat-card-header>
                <mat-card-title>{{ member.firstName }} {{ member.lastName }}</mat-card-title>
                <mat-card-subtitle>{{ member.username }} • {{ member.role ?? 'USER' }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-actions>
                <button mat-flat-button color="{{ member.banned ? 'warn' : 'primary' }}" (click)="toggleBan(member)">
                    <mat-icon>{{ member.banned ? 'block' : 'check_circle' }}</mat-icon>
                    {{ member.banned ? 'Unban' : 'Ban' }}
                </button>
            </mat-card-actions>
        </mat-card>
        }
    </div>

</div>
