<h2 mat-dialog-title>{{ mode() === 'edit' ? 'Modifica Tavolo' : 'Nuovo Tavolo' }}</h2>

<mat-dialog-content class="form-container">
  <div style="display: flex; flex-direction: column; gap: 15px; padding-top: 10px;">
    
    <mat-form-field appearance="outline">
      <mat-label>Nome Tavolo</mat-label>
      <input matInput [(ngModel)]="table().name" placeholder="es. Tavolo 12">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Capacità (Posti)</mat-label>
      <input matInput type="number" [(ngModel)]="table().capacity">
    </mat-form-field>

    <mat-checkbox [(ngModel)]="table().available" color="primary">
      Disponibile per prenotazioni
    </mat-checkbox>

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Annulla</button>
  <button mat-flat-button color="primary" (click)="save()" [disabled]="!table().name">
    {{ mode() === 'edit' ? 'Aggiorna' : 'Salva' }}
  </button>
</mat-dialog-actions>
