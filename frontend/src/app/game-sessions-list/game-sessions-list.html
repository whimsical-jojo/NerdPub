<div class="w3-row-padding">
    @if (gameSessions().length === 0) {
    <div class="empty-panel">
      <p><span class="empty-icon" aria-hidden="true">ℹ️</span> Nessun risultato.</p>
    </div>
    }
    @for (session of sortedSessions(); track session.id) {
    <div class="w3-col l4 m6 s12">
      <app-game-session-preview [gameSession]="session" [isBooked]="isSessionBooked(session.id)"
        (actionClicked)="handleAction($event)"></app-game-session-preview>
    </div>
    }
</div>
