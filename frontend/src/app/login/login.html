<h2 mat-dialog-title class="dialog-title">
  <span class="login-brand">NerdPub</span>
  <span class="login-heading">Accedi</span>
</h2>

<form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="login-form">
  <mat-dialog-content class="login-content">
    <p class="login-lead">Inserisci le tue credenziali per prenotare o gestire le sessioni.</p>

    <mat-form-field class="login-field" appearance="fill">
      <mat-label>Nome utente</mat-label>
      <input
        matInput
        type="text"
        name="username"
        [(ngModel)]="username"
        required
        autocomplete="username"
      />
    </mat-form-field>

    <mat-form-field class="login-field" appearance="fill">
      <mat-label>Password</mat-label>
      <input
        matInput
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        autocomplete="current-password"
      />
    </mat-form-field>

    @if (errorMessage()) {
      <p class="login-error" role="alert">{{ errorMessage() }}</p>
    }
  </mat-dialog-content>

  <mat-dialog-actions class="login-actions" align="end">
    <button mat-stroked-button type="button" class="login-cancel" (click)="dialogRef.close()">
      Annulla
    </button>
    <button
      mat-flat-button
      type="submit"
      class="login-submit"
      color="primary"
      [disabled]="loginForm.invalid"
    >
      Accedi
    </button>
  </mat-dialog-actions>
</form>
