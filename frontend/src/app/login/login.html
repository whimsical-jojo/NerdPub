<h2 mat-dialog-title>Login</h2>

<form #loginForm="ngForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content class="login-content">
    
      <mat-form-field class="field">
        <mat-label>Username</mat-label>
        <input matInput type="text" name="username" [(ngModel)]="username" required>
      </mat-form-field>
    
      <mat-form-field class="field">
        <mat-label>Password</mat-label>
        <input matInput type="password" name="password" [(ngModel)]="password" required>
      </mat-form-field>
   

    @if (errorMessage()) {
    <p style="color: red;">
      {{ errorMessage() }}
    </p>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="start">
    <button matButton type="submit" [disabled]="loginForm.invalid">
      Login
    </button>


  </mat-dialog-actions>
</form>
