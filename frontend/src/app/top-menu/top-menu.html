<mat-toolbar color="primary" class="main-header">
  <div class="container">
    <span class="logo" routerLink="/">NerdPub</span>
    <span class="spacer"></span>
    @if(authService.isLoggedIn()) {
      <span class="welcome-text">Benvenuto, {{ authService.currentUser()!.firstName }}!</span>
    }
    <nav>
      <button mat-button routerLink="/" routerLinkActive="active-link">Home</button>
      @if(authService.isLoggedIn()) {
        <button mat-button routerLink='/profile' routerLinkActive="active-link">Profilo</button>
        @if(authService.currentUser()!.role==='ADMIN') {
          <button mat-button routerLink="/admin" routerLinkActive="active-link">Admin</button>
        }
        <button mat-button (click)="logout()">Logout</button>
      } @else {
        <button mat-button (click)="login()">Login</button>
      }
        
    </nav>
  </div>
</mat-toolbar>
