<h2 mat-dialog-title class="dialog-title">
    {{ mode() === 'edit' ? 'Modifica account' : 'Crea account' }}
</h2>

<form #memberForm="ngForm" class="member-form">
    <div mat-dialog-content class="member-content">

        <mat-form-field appearance="fill">
            <mat-label>Nome</mat-label>
            <input matInput type="text" name="firstname" [(ngModel)]="member().firstName" required />
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Cognome</mat-label>
            <input matInput type="text" name="lastname" [(ngModel)]="member().lastName" required />
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Nome utente</mat-label>
            <input matInput type="text" name="username" [(ngModel)]="member().username" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Data di nascita</mat-label>
            <input matInput [matDatepicker]="picker" name="dob" [(ngModel)]="member().dob" required>
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>


        <!-- PASSWORD ONLY ON CREATE -->
        @if (mode() === 'create') {
        <mat-form-field appearance="fill" class="member-field full-width">
            <mat-label>Password</mat-label>
            <input matInput type="password" name="password" [(ngModel)]="member().password" required />
        </mat-form-field>
        }
    </div>

    <div mat-dialog-actions align="end">
        <button mat-stroked-button (click)="dialogRef.close()">Annulla</button>
        <!-- ACTION BUTTON -->
        <div class="form-actions">
            <button mat-raised-button color="primary" (click)="mode() === 'create' ? create() : update()"
                [disabled]="!memberForm.valid">

                {{ mode() === 'create' ? 'Crea account' : 'Salva modifiche' }}

            </button>
        </div>
    </div>

</form>
