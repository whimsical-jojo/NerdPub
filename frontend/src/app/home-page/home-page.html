<div class="homepage">
  <div class="w3-content w3-container w3-padding-32">
    <div class="w3-row">
      <div class="w3-col s12 m10 l8" style="float:none;margin:auto;">
        <h1 class="w3-center">Welcome to the Games Center!</h1>
        <p class="w3-center">Discover and play a variety of games with your friends.</p>

        <!-- SEARCH BAR -->
        <div class="w3-center w3-padding-16">
          <input
            type="text"
            class="w3-input w3-border"
            placeholder="Enter city name..."
            [(ngModel)]="searchCity"
            (keyup.enter)="searchSessions()"
          />
          <button class="w3-button w3-blue w3-margin-top" (click)="searchSessions()">
            Search
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Only show list after search -->
  <ng-container *ngIf="gameSessions() && gameSessions().length > 0">
    <app-game-sessions-list [gameSessions]="gameSessions()"></app-game-sessions-list>
  </ng-container>

  <!-- Optional: show message if search returned empty -->
  <div *ngIf="searchPerformed && (!gameSessions() || gameSessions().length === 0)" class="w3-center w3-padding">
    No sessions found for "{{ searchCity() }}".
  </div>
</div>
