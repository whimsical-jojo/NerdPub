<div class="homepage">
  <div class="w3-content w3-container w3-padding-32">
    <div class="w3-row">
      <div class="w3-col s12 m10 l8" style="float:none;margin:auto;">
        <h1 class="w3-center">NerdPub</h1>
        <p class="w3-center">Mettiti in gioco: scopri il tavolo perfetto per la tua compagnia</p>

        <!-- SEARCH BARS INLINE -->
        <div class="search-flex-container">
          <app-city-picker [(city)]="city" />
          <app-advanced-session-search-accordion [(gameTitle)]="gameTitle" [(daysAhead)]="daysAhead" class="advanced-bars" />
          <button class="w3-button w3-blue search-btn" (click)="searchSessions()">
            Search
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Only show list after search -->
  @if(gameSessions() && gameSessions().length > 0) {
  <app-game-sessions-list [gameSessions]="gameSessions()"></app-game-sessions-list>
  }

  <!-- Optional: show message if search returned empty -->
  @if(searchPerformed && (!gameSessions() || gameSessions().length === 0)){
  <div class="w3-center w3-padding">
    No sessions found for "{{ city() }}".
  </div>
  }

</div>
