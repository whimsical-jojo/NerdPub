<div class="homepage">
  <div class="hero-section">
    <h1 class="w3-center">NerdPub</h1>
    <p class="w3-center">Trova il tavolo perfetto per la tua prossima sessione.</p>

    <div class="search-header">
      <div class="filter-controls">
        <app-city-picker [(city)]="city" class="filter-item" />
        
        <app-game-picker [(selectedGame)]="selectedGame" class="filter-item" />

        <div class="slider-wrapper filter-item">
          <label class="slider-label">Prossimi <strong>{{ daysAhead() }}</strong> giorni</label>
          <mat-slider min="0" max="30" step="1">
            <input matSliderThumb [ngModel]="daysAhead()" (ngModelChange)="daysAhead.set($event)">
          </mat-slider>
        </div>

        <button mat-flat-button class="home-search-btn" (click)="searchSessions()">
          <mat-icon>search</mat-icon> CERCA
        </button>
      </div>
    </div>
  </div>


  <!-- Only show list after search -->
  @if(gameSessions() && gameSessions().length > 0) {
  <app-game-sessions-list [gameSessions]="gameSessions()"></app-game-sessions-list>
  }

  <!-- Optional: show message if search returned empty -->
  @if(searchPerformed && (!gameSessions() || gameSessions().length === 0)){
  <div class="w3-center w3-padding">
    No sessions found for "{{ city() }}".
  </div>
  }

</div>
