<div class="home-page">
  <header class="home-hero">
    <span class="section-label">NerdPub</span>
    <h1 class="home-title">Prossime <em>sessioni</em></h1>
    <p class="home-sub">
      Scegli la città e trova una partita a cui unirti.
    </p>
    <div class="home-picker">
      <app-city-picker
        [city]="searchCity"
        (cityChange)="onCityChange($event)"
      ></app-city-picker>
    </div>
  </header>

  <app-game-sessions-list [gameSessions]="gameSessions()"></app-game-sessions-list>
</div>
