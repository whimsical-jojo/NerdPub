<div class="search-bars-container">
  <mat-form-field appearance="fill" class="form-field">
    <mat-label>Titolo del gioco</mat-label>
    <input matInput type="text" name="gameTitle" [(ngModel)]="gameTitle" />
  </mat-form-field>

  <!-- Slider -->
  <div class="slider-container">
    <label>Giorni: {{ daysAhead() }}</label>
    <mat-slider min="0" max="60" step="1" thumbLabel>
      <input matSliderThumb [value]="daysAhead()" (valueChange)="daysAhead.set($event)" />
    </mat-slider>
  </div>
</div>
