<div class="profile-container">

  <!-- HEADER -->
  <div class="w3-container profile-header w3-center">
    <div class="avatar">👤</div>
    <h1 class="profile-title">Il tuo profilo</h1>
    <p class="profile-subtitle">Gestisci il tuo account e le tue sessioni</p>
  </div>

  <!-- ACTIONS -->
  <div class="w3-container actions-container">

    <div class="actions-card">

      <h2 class="section-title">Account</h2>

      <div class="actions-buttons">

        <!-- EDIT PROFILE -->
        <button mat-raised-button
                color="primary"
                (click)="openEditProfile()">
          Modifica account
        </button>

        <!-- CHANGE PASSWORD -->
        <button mat-stroked-button
                color="accent"
                (click)="changePassword()">
          Cambia password
        </button>

      </div>

    </div>

  </div>

  <!-- BOOKED SESSIONS -->
  <div class="w3-container list-container">
    <div class="w3-padding-32 w3-center list-header">
      <h1 class="list-title">Le tue sessioni</h1>
      <p class="w3-text-grey">Sessioni a cui sei iscritto</p>
    </div>

    <div class="w3-row-padding">
      <app-game-sessions-list
        [gameSessions]="gameSessions()">
      </app-game-sessions-list>
    </div>
  </div>

</div>
