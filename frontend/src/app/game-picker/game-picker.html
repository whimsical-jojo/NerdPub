<mat-form-field appearance = "outline"class="search-bar">
  <mat-label>Gioco</mat-label>
  <mat-icon matPrefix>casino</mat-icon>
  <input type="text" matInput [ngModel]="query()" (ngModelChange)="onInputChange($event)" [matAutocomplete]="auto" />
  <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
    @for (option of filteredGames(); track option.id) {
    <mat-option [value]="option" (onSelectionChange)="selectGame(option)">
      {{ option.title }}
    </mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
