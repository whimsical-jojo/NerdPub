<form #newtableform="ngForm" class="w3-col s12 m10 l8">
    <label for="name">Nome</label>
    <input type="text" name="name" [(ngModel)]="newTable.name" class="w3-input" required/>
    <label for="capacity">Capienza</label>
    <input type="number" name="capacity" [(ngModel)]="newTable.capacity" class="w3-input" required min="0"/>
    <label for="available">Disponibile</label>
    <input type="radio" name="available" [(value)]="newTable.available"/>
    <select name="pubs" class="w3-input " value="Seleziona un pub..." required>
        @for(pub of pubs(); track pub.id)
        {
            <option value="pub">{{pub.name}} - {{pub.address}}, {{pub.city}}</option>
        }
    </select>"
    <input type="button" (click)="save();newtableform.resetForm();" class="w3-btn w3-teal w3-input" value="Salva"  [disabled]="!newtableform.valid"/>

</form>
