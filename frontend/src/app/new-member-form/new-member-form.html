<form #newmemberform="ngForm" class="w3-col s12 m10 l8">
    <label for="firstname">Nome</label>
    <input type="text" name="firstname" [(ngModel)]="newMember.firstName" class="w3-input" required/>
    <label for="lastname">Cognome</label>
    <input type="text" name="lastname" [(ngModel)]="newMember.lastName" class="w3-input" required/>
    <label for="username">Nome utente</label>
    <input type="text" name="username" [(ngModel)]="newMember.username" class="w3-input" required/>
    <label for="dob">Data di nascita</label>
    <input type="date" name="dob" [(ngModel)]="newMember.dob" class="w3-input" required/>
    <input type="button" (click)="save()" class="w3-btn w3-teal w3-input" value="Salva" [disabled]="!newmemberform.valid" />
</form>
